name: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'PHP version'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
      force:
        type: choice
        description: 'Force recreate images'
        required: false
        default: 'false'
        options:
          - 'true'
          - 'false'

env:
  PHP_VERSIONS: '8.2,8.3,8.4,8.5'
  GHCR_SLUG: ghcr.io/toshy/php

permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      variants: ${{ steps.matrix.outputs.variants }}
      platforms: ${{ steps.matrix.outputs.platforms }}
      targets: ${{ steps.matrix.outputs.targets }}
      flavors: ${{ steps.matrix.outputs.flavors }}
      metadata: ${{ steps.matrix.outputs.metadata }}
      php_versions: ${{ steps.check_image.outputs.php_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Skopeo
        uses: supplypike/setup-bin@8365380a806a88e7a0f0d07059b175ca2f5418d7 # v5.0.1
        with:
          uri: 'https://github.com/lework/skopeo-binary/releases/download/v1.21.0/skopeo-linux-amd64'
          name: 'skopeo'
          version: 'v1.22.2'

      - name: Get PHP versions
        id: check_version
        env:
          VERSION_INPUT: ${{ inputs.version }}
          DEFAULT_PHP_VERSIONS: ${{ env.PHP_VERSIONS }}
        run: |
          if [ -n "$VERSION_INPUT" ] && [ "$VERSION_INPUT" != "all" ]; then
            echo "PHP 'version' set to '$VERSION_INPUT'."
            SELECTED_PHP_VERSIONS=("$VERSION_INPUT")
          else
            echo "PHP 'version' set to '$DEFAULT_PHP_VERSIONS' (default)."
            IFS=',' read -ra SELECTED_PHP_VERSIONS <<< "$DEFAULT_PHP_VERSIONS"
          fi

          PHP_VERSIONS=()
          for pv in "${SELECTED_PHP_VERSIONS[@]}"; do
            PHP_VERSIONS+=("$(skopeo inspect "docker://docker.io/library/php:$pv" --override-os linux --override-arch amd64 | jq -r '.Env[] | select(test("^PHP_VERSION=")) | sub("^PHP_VERSION="; "")')")
          done

          CONCATENATED_PHP_VERSIONS="$(printf "%s," "${PHP_VERSIONS[@]}" | cut -d "," -f "1-${#PHP_VERSIONS[@]}")"
          echo "Images will be build for the following versions: '$CONCATENATED_PHP_VERSIONS'."

          {
            echo "php_versions=$CONCATENATED_PHP_VERSIONS"
          } >> "${GITHUB_OUTPUT}"

      - name: Check if PHP images already exists
        id: check_image
        env:
          GHCR_SLUG: ${{ env.GHCR_SLUG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_VERSION_OUTPUT: ${{ steps.check_version.outputs.php_versions }}
          FORCE_INPUT: ${{ inputs.force }}
        run: |
          # Retrieve current registry tags
          RESPONSE=$(skopeo list-tags "docker://${GHCR_SLUG}" --creds "${GITHUB_ACTOR}:${GITHUB_TOKEN}")

          # In case of a new GitHub repository, or has registry but without any tags without any tags yet
          if echo "$RESPONSE" | jq -e '.errors' >/dev/null 2>&1 || echo "$RESPONSE" | jq -e '.Tags == null' >/dev/null 2>&1; then
            if echo "$RESPONSE" | jq -e '.errors' >/dev/null 2>&1; then
              MESSAGE=$(echo "$RESPONSE" | jq -e '.errors[0].message')
            else
              MESSAGE=$(echo "$RESPONSE" | jq -e '.Tags // "empty"')
            fi

            echo "No tags found (Response: $MESSAGE). Proceed to build step."

            # Re-export php_versions
            {
              echo "php_versions=$CHECK_VERSION_OUTPUT"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Current released php versions from GitHub packages
          PACKAGE_PHP_VERSIONS=$(echo "$RESPONSE" | jq -r '.Tags[]' | grep -oP '^\d+(\.\d+){0,2}(?=-)' | sort -uV | jq -R . | jq -s .)

          # Check which PHP tags already exists; remove already existing ones from list if "force" input was not provided
          CURRENT_PHP_VERSIONS="$CHECK_VERSION_OUTPUT"
          IFS=',' read -ra PHP_VERSIONS_ARRAY <<< "$CHECK_VERSION_OUTPUT"
          for pv in "${PHP_VERSIONS_ARRAY[@]}"; do
            TAG_EXISTS=$(echo "$PACKAGE_PHP_VERSIONS" | jq 'index("'"$pv"'") != null')
            if [ "$TAG_EXISTS" = "true" ]; then
              if [ "$FORCE_INPUT" == "true" ]; then
                echo "Image with tag '$pv' already exists. Force build step."
              else
                echo "Image with tag '$pv' already exists. Skip build step for specific tag."
                CURRENT_PHP_VERSIONS=$(echo "$CURRENT_PHP_VERSIONS" | sed "s/,${pv}//;s/${pv},//;s/^${pv}$//")
              fi
            else
              echo "Image with tag '$pv' not found. Proceed to build step."
            fi
          done

          # Re-export php_versions
          {
            echo "php_versions=$(echo "$CURRENT_PHP_VERSIONS" | xargs)"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        if: ${{ steps.check_image.outputs.php_versions != ''}}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Create variants matrix
        if: ${{ steps.check_image.outputs.php_versions != ''}}
        id: matrix
        shell: bash
        run: |
          METADATA="$(docker buildx bake --print | jq -c)"
          # Single source of truth: derive targets from bake metadata's per-target
          # stage name (`.target.<name>.target`), not from parsing target keys.
          TARGETS="$(jq -c '[.target[].target] | unique' <<< "${METADATA}")"
          # Build a regex of "-<target>" alternatives (longest-first) used to strip
          # the target suffix from bake target names so we can derive variants/flavors.
          SUFFIX_REGEX="$(jq -r 'sort_by(-(.|length))|map("-"+.)|join("|")' <<< "${TARGETS}")"
          VARIANTS="$(jq -c --arg re "$SUFFIX_REGEX" '.group.default.targets|map(sub($re; ""))|unique' <<< "${METADATA}")"
          FLAVORS="$(jq -c 'map(split("-")[-2])|unique' <<< "${VARIANTS}")"
          PLATFORMS="$(jq -c 'first(.target[]) | .platforms' <<< "${METADATA}")"
          {
            echo metadata="$METADATA"
            echo targets="$TARGETS"
            echo flavors="$FLAVORS"
            echo variants="$VARIANTS"
            echo platforms="$PLATFORMS"
          } >> "${GITHUB_OUTPUT}"
        env:
          SHA: ${{ github.sha }}
          VERSION: ${{ (github.ref_type == 'tag' && github.ref_name) || github.event.repository.default_branch }}
          PHP_VERSIONS: ${{ steps.check_image.outputs.php_versions }}

  build:
    runs-on: ${{ startsWith(matrix.platform, 'linux/arm') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    needs:
      - prepare
    if: ${{ needs.prepare.outputs.php_versions != '' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.variants) }}
        platform: ${{ fromJson(needs.prepare.outputs.platforms) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive bake args
        id: bake_args
        shell: bash
        env:
          TARGETS_JSON: ${{ needs.prepare.outputs.targets }}
          VARIANT: ${{ matrix.variant }}
          PLATFORM: ${{ matrix.platform }}
          REF: ${{ github.ref }}
          GHCR_SLUG: ${{ env.GHCR_SLUG }}
          PUSH: ${{ github.event_name != 'pull_request' }}
        run: |
          {
            echo 'targets<<EOF'
            jq -r --arg v "$VARIANT" '.[] | "\($v)-\(.)"' <<< "$TARGETS_JSON"
            echo 'EOF'

            echo 'set<<EOF'
            printf '*.tags=\n*.platform=%s\n' "$PLATFORM"
            jq -r --arg v "$VARIANT" --arg ref "$REF" --arg plat "$PLATFORM" '
              .[] |
              "\($v)-\(.).cache-from=type=gha,scope=\($v)-\(.)-\($ref)-\($plat)\n" +
              "\($v)-\(.).cache-to=type=gha,scope=\($v)-\(.)-\($ref)-\($plat)"
            ' <<< "$TARGETS_JSON"
            printf '*.output=type=image,name=%s,push-by-digest=true,name-canonical=true,push=%s\n' \
              "$GHCR_SLUG" "$PUSH"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build images and push
        id: bake
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: ${{ steps.bake_args.outputs.targets }}
          provenance: true
          set: ${{ steps.bake_args.outputs.set }}
        env:
          SHA: ${{ github.sha }}
          VERSION: ${{ (github.ref_type == 'tag' && github.ref_name) || github.event.repository.default_branch }}
          PHP_VERSIONS: ${{ needs.prepare.outputs.php_versions }}

      # Workaround for https://github.com/actions/runner/pull/2477#issuecomment-1501003600
      - name: Export digests
        env:
          METADATA: ${{ steps.bake.outputs.metadata }}
          TARGETS_JSON: ${{ needs.prepare.outputs.targets }}
          VARIANT: ${{ matrix.variant }}
        run: |
          mapfile -t TARGETS < <(jq -r '.[]' <<< "$TARGETS_JSON")
          for tgt in "${TARGETS[@]}"; do
            mkdir -p "/tmp/digest/$tgt"
            targetDigest=$(jq -r --arg v "$VARIANT" --arg t "$tgt" '.["\($v)-\($t)"]."containerimage.digest"' <<< "$METADATA")
            echo "Digest for $tgt: ${targetDigest#sha256:}"
            touch "/tmp/digest/$tgt/${targetDigest#sha256:}"
          done

      - name: Prepare path safe platform name
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          platform="$PLATFORM"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Upload digests
        # Single bundled upload: preserves the `<target>/<sha>` directory layout
        # produced by `Export digests`. Adding a target requires no edits here.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest--${{ matrix.variant }}--${{ env.PLATFORM_PAIR }}
          path: /tmp/digest/
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    needs:
      - prepare
      - build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.variants) }}
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digest
          pattern: digest--${{ matrix.variant }}--*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R /tmp/digest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digest/${{ matrix.target }}
        env:
          METADATA: ${{ needs.prepare.outputs.metadata }}
          VARIANT: ${{ matrix.variant }}
          TARGET: ${{ matrix.target }}
          GHCR_SLUG: ${{ env.GHCR_SLUG }}
        run: |
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools create $(jq -cr --arg v "$VARIANT" --arg t "$TARGET" --arg slug "$GHCR_SLUG" '.target["\($v)-\($t)"].tags|map(select(startswith($slug))| "-t " + .)|join(" ")' <<< "${METADATA}") \
            $(printf "%s@sha256:%s " "$GHCR_SLUG" *)

      - name: Inspect image
        env:
          METADATA: ${{ needs.prepare.outputs.metadata }}
          VARIANT: ${{ matrix.variant }}
          TARGET: ${{ matrix.target }}
        run: |
          # shellcheck disable=SC2046,SC2086
          docker buildx imagetools inspect $(jq -cr --arg v "$VARIANT" --arg t "$TARGET" '.target["\($v)-\($t)"].tags|first' <<< "${METADATA}")
